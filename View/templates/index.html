<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISpy - Gerador CSV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>
:root {
    --purple: #6C3BFF;
    --bg-dark: radial-gradient(circle at top, #1a0f4a, #05010f);
    --card: #EDEDED;
    --text: #111;
}

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Logo */
.logo {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 30px;
    letter-spacing: 1px;
}

.logo span:first-child {
    color: #fff;
}

.logo span:last-child {
    color: var(--purple);
}

/* Card */
.container {
    background: var(--card);
    padding: 30px;
    border-radius: 12px;
    width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* Form */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
}

textarea {
    width: 100%;
    height: 90px;
    border: none;
    border-radius: 6px;
    background: #DCDCDC;
    padding: 10px;
    resize: none;
    font-family: inherit;
}

/* Footer do card */
.actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
}

/* Botão + */
.add-btn {
    width: 28px;
    height: 28px;
    background: black;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
}

/* Botão principal */
.submit-btn {
    background: var(--purple);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.submit-btn:hover {
    opacity: 0.9;
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 11px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="logo">
    <img src="/static/images/Logo01.png" alt="SISpy Logo" width="100" >
</div>

<div class="container">
    <form id="csvForm" action="/gerar-csv" method="post">

        <label>IDs dos cursos (SIS) (um por linha):</label>
        <textarea name="cursos"></textarea>

        <label>Matrículas (uma por linha):</label>
        <textarea name="matriculas"></textarea>

        <div class="actions">
            <button type="submit" class="submit-btn">GERAR ARQUIVO CSV</button>
        </div>

    </form>
</div>

<div class="footer">
    Versão beta 1.1 - Powered by @fabiodfilho
</div>

<script>
document.getElementById("csvForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    try {
        const response = await fetch("/gerar-csv", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            const errorText = await response.text();
            alert("Erro: " + errorText);
            return;
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "arquivo.csv";
        a.click();

        window.URL.revokeObjectURL(url);

    } catch (err) {
        alert("Erro ao conectar com o servidor.");
        console.error(err);
    }
});
</script>

</body>
</html>
