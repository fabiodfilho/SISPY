<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISpy</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="logo">
    <img src="/static/images/Logo01.png" alt="SISpy Logo" width="180">
</div>

<div class="container">
    <form id="csvForm">
        <div id="dynamic-fields">
            <div class="field-group-wrapper">
                <div class="field-group">
                    <label>IDs dos cursos (SIS):</label>
                    <textarea name="cursos[]" placeholder="Um por linha"></textarea>

                    <label>Matrículas:</label>
                    <textarea name="matriculas[]" placeholder="Uma por linha"></textarea>
                </div>
                <button type="button" class="remove-btn" title="Remover este bloco">❌</button>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="add-btn" id="btnAdd" title="Adicionar novo bloco">+</button>
            <button type="submit" class="submit-btn">GERAR ARQUIVO CSV</button>
        </div>
    </form>
</div>

<div class="footer">
    Versão beta 2.0 - Powered by @fabiodfilho
</div>

<script>
    document.getElementById("btnAdd").addEventListener("click", function() {
        const container = document.getElementById("dynamic-fields");
        
        const firstWrapper = container.querySelector(".field-group-wrapper");
        const newWrapper = firstWrapper.cloneNode(true);
        
        newWrapper.querySelectorAll("textarea").forEach(t => t.value = "");
        
        newWrapper.classList.add("show-remove");

        newWrapper.querySelector(".remove-btn").addEventListener("click", function() {
            newWrapper.remove();
        });

        container.appendChild(newWrapper);
        
        newWrapper.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });

    document.getElementById("csvForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const formData = new FormData(this);

        try {
            const response = await fetch("/gerar-csv", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                alert(errorText);
                return;
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "matriculas_sis.csv";
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } catch (err) {
            alert("Erro ao conectar com o servidor.");
        }
    });
</script>
</body>
</html>
